<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI — AZ Pool Arena</title>
    <meta name="description" content="Jarvis - Quản gia trí tuệ nhân tạo tại AZ Pool Arena. Trợ lý thông minh hỗ trợ vận hành và điều khiển thiết bị.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
    <div class="app-container">
        <!-- Ambient background effects -->
        <div class="ambient-bg">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="jarvis-logo">
                    <div class="logo-ring">
                        <div class="logo-core"></div>
                    </div>
                    <div class="logo-text">
                        <h1>JARVIS</h1>
                        <span class="logo-subtitle">AZ Pool Arena</span>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="chat" id="nav-chat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                    <span>Trò chuyện</span>
                </button>
                <button class="nav-item" data-view="devices" id="nav-devices">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <span>Thiết bị</span>
                </button>
                <button class="nav-item" data-view="history" id="nav-history">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>Lịch sử</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="status-indicator" id="connection-status">
                    <div class="status-dot"></div>
                    <span>Đang kết nối...</span>
                </div>
                <button class="btn-clear" id="btn-clear-history" title="Xóa lịch sử">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Chat Header -->
            <header class="chat-header">
                <button class="btn-menu" id="btn-toggle-sidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="header-info">
                    <h2>Jarvis AI Assistant</h2>
                    <span class="header-subtitle" id="header-status">Quản gia trí tuệ nhân tạo</span>
                </div>
                <div class="header-actions">
                    <div class="ai-pulse" id="ai-pulse">
                        <div class="pulse-ring"></div>
                        <div class="pulse-core"></div>
                    </div>
                </div>
            </header>

            <!-- Messages Container -->
            <div class="messages-container" id="messages-container">
                <div class="messages-scroll" id="messages-scroll">
                    <!-- Welcome Message -->
                    <div class="welcome-screen" id="welcome-screen">
                        <div class="welcome-logo">
                            <div class="welcome-ring">
                                <div class="welcome-core">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        <h2>Xin chào, tôi là <span class="gradient-text">Jarvis</span></h2>
                        <p>Quản gia trí tuệ nhân tạo tại AZ Pool Arena. Tôi có thể hỗ trợ anh/chị điều khiển thiết bị, tư vấn hoặc giải đáp mọi thắc mắc.</p>
                        
                        <div class="quick-actions">
                            <button class="quick-btn" data-message="Bật đèn bàn 5">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21h6M12 3a6 6 0 016 6c0 2.22-1.21 4.16-3 5.2V17H9v-2.8C7.21 13.16 6 11.22 6 9a6 6 0 016-6z"/></svg>
                                <span>Bật đèn bàn 5</span>
                            </button>
                            <button class="quick-btn" data-message="Tắt tất cả đèn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 7l-10 10M7 7l10 10"/></svg>
                                <span>Tắt tất cả đèn</span>
                            </button>
                            <button class="quick-btn" data-message="Mở scoreboard bàn 3">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                                <span>Bật scoreboard bàn 3</span>
                            </button>
                            <button class="quick-btn" data-message="Hướng dẫn luật 9-ball">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5"/></svg>
                                <span>Luật 9-ball</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-container" id="input-container">
                        <textarea 
                            id="message-input" 
                            placeholder="Nhập tin nhắn hoặc nhấn 🎤 để nói..." 
                            rows="1"
                            maxlength="2000"
                        ></textarea>
                        <button class="btn-mic" id="btn-mic" title="Nhấn để nói (Giữ để nói liên tục)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                                <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                                <line x1="12" y1="19" x2="12" y2="23"/>
                                <line x1="8" y1="23" x2="16" y2="23"/>
                            </svg>
                        </button>
                        <button class="btn-send" id="btn-send" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                    <span class="input-hint">Enter gửi • Shift+Enter xuống dòng • 🎤 Mic để nói</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Device command toast -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/app.js?v=3"></script>
</body>
</html>
