# =============================================================
# AZ PoolArena — Production Docker Compose
#
# Nginx: dùng BT Panel nginx sẵn có (không Dockerize nginx)
#   → backend bind 127.0.0.1:8000, poolarena bind 127.0.0.1:3000
#   → BT Panel nginx proxy đến localhost:8000 và :3000 (không đổi config)
#
# Migration từ PM2:
#   1. Dump DB: pg_dump -U poolarena poolarena > /tmp/dump.sql
#   2. Tạo .env (copy từ .env.prod.example, điền giá trị thực)
#   3. docker compose -f docker-compose.prod.yml up -d db mqtt
#   4. Restore: docker exec -i azpool-db-prod psql -U poolarena poolarena < /tmp/dump.sql
#   5. docker compose -f docker-compose.prod.yml up -d
#   6. pm2 stop azpool-api poolarena-nextjs
# =============================================================

services:
  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    container_name: azpool-db-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-poolarena}
      POSTGRES_USER: ${POSTGRES_USER:-poolarena}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poolarena} -d ${POSTGRES_DB:-poolarena}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - azpool-prod

  # ---- MQTT Broker ----
  mqtt:
    image: eclipse-mosquitto:2
    container_name: azpool-mqtt-prod
    restart: always
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data_prod:/mosquitto/data
      - mosquitto_log_prod:/mosquitto/log
    networks:
      - azpool-prod

  # ---- NestJS Backend + CMS (production bundle) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: azpool-backend:prod
    container_name: azpool-backend-prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      # Override để dùng tên service Docker thay vì localhost
      DATABASE_URL: postgresql://${POSTGRES_USER:-poolarena}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:-poolarena}
      MQTT_URL: mqtt://mqtt:1883
      NODE_ENV: production
      ENV: production
      PORT: 8000
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - azpool-prod

  # ---- Next.js Poolarena (production standalone) ----
  poolarena:
    build:
      context: ./poolarena
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://cms.poolarena.vn}
    image: azpool-poolarena:prod
    container_name: azpool-poolarena-prod
    restart: always
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - azpool-prod

volumes:
  postgres_data_prod:
    name: azpool_postgres_prod
  mosquitto_data_prod:
    name: azpool_mosquitto_data_prod
  mosquitto_log_prod:
    name: azpool_mosquitto_log_prod

networks:
  azpool-prod:
    name: azpool-prod-network
    driver: bridge
