services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: azpool-db-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - azpool-network

  # MQTT Broker
  mqtt:
    image: eclipse-mosquitto:2
    container_name: azpool-mqtt-prod
    restart: always
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data_prod:/mosquitto/data
      - mosquitto_log_prod:/mosquitto/log
    networks:
      - azpool-network

  # Backend + CMS (unified image — NestJS serve cả API lẫn React SPA)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ""
    container_name: azpool-backend-prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENV: ${ENV:-production}
      PORT: 8000
      MQTT_URL: mqtt://mqtt:1883
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      FORCE_HTTPS: ${FORCE_HTTPS:-true}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      CASSO_SECURE_TOKEN: ${CASSO_SECURE_TOKEN}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - uploads_prod:/app/uploads
    networks:
      - azpool-network

  # PoolArena Customer App (Next.js — giữ nguyên)
  poolarena:
    build:
      context: ./poolarena
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: azpool-poolarena-prod
    restart: always
    depends_on:
      - backend
    networks:
      - azpool-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: azpool-nginx-prod
    restart: always
    depends_on:
      - backend
      - poolarena
    ports:
      - "80:80"
      - "443:443"
    # nginx:alpine tự động chạy envsubst trên files trong /etc/nginx/templates/*.template
    # và output ra /etc/nginx/conf.d/ trước khi nginx khởi động
    environment:
      DOMAIN: ${DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      POOLARENA_DOMAIN: ${POOLARENA_DOMAIN}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - uploads_prod:/var/www/uploads:ro
    networks:
      - azpool-network

volumes:
  postgres_data_prod:
    name: azpool_postgres_prod
  uploads_prod:
    name: azpool_uploads_prod
  mosquitto_data_prod:
    name: azpool_mosquitto_data_prod
  mosquitto_log_prod:
    name: azpool_mosquitto_log_prod

networks:
  azpool-network:
    name: azpool-prod-network
    driver: bridge
